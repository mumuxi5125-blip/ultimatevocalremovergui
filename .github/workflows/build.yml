name: Build UVR Windows Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # 允许手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate .spec file (if missing)
        run: |
          if (Test-Path "UVR.spec") {
            Write-Host "UVR.spec already exists"
          } else {
            pyi-makespec --onefile --windowed --name UVR UVR.py
          }

      - name: Modify .spec to include hidden imports
        run: |
          $spec = Get-Content UVR.spec -Raw
          $spec = $spec -replace 'hiddenimports=\[\]', 'hiddenimports=["demucs.htdemucs"]'
          Set-Content UVR.spec $spec

      - name: Build with PyInstaller
        run: pyinstaller UVR.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UVR_Windows_Portable
          path: dist/
